name: Build & Deploy

on:
  push:
    branches: [main]

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Job 1 : build les 4 images Docker et les push sur GHCR
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & Push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── web ────────────────────────────────────────────────────────────────
      - name: Build & push — web
        uses: docker/build-push-action@v6
        with:
          context: ./apps/web
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/spontaneo-web:latest
            ghcr.io/${{ env.OWNER }}/spontaneo-web:${{ github.sha }}
          cache-from: type=gha,scope=web
          cache-to:   type=gha,mode=max,scope=web

      # ── worker ─────────────────────────────────────────────────────────────
      - name: Build & push — worker
        uses: docker/build-push-action@v6
        with:
          context: ./apps/worker
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/spontaneo-worker:latest
            ghcr.io/${{ env.OWNER }}/spontaneo-worker:${{ github.sha }}
          cache-from: type=gha,scope=worker
          cache-to:   type=gha,mode=max,scope=worker

      # ── ai-service ─────────────────────────────────────────────────────────
      - name: Build & push — ai-service
        uses: docker/build-push-action@v6
        with:
          context: ./apps/ai-service
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/spontaneo-ai:latest
            ghcr.io/${{ env.OWNER }}/spontaneo-ai:${{ github.sha }}
          cache-from: type=gha,scope=ai
          cache-to:   type=gha,mode=max,scope=ai

      # ── cron ───────────────────────────────────────────────────────────────
      - name: Build & push — cron
        uses: docker/build-push-action@v6
        with:
          context: ./apps/cron
          push: true
          tags: |
            ghcr.io/${{ env.OWNER }}/spontaneo-cron:latest
            ghcr.io/${{ env.OWNER }}/spontaneo-cron:${{ github.sha }}
          cache-from: type=gha,scope=cron
          cache-to:   type=gha,mode=max,scope=cron

  # ────────────────────────────────────────────────────────────────────────────
  # Job 2 : déploie sur le VPS via SSH (après que les 4 images soient pushées)
  # ────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # S'assure que le dossier existe sur le VPS
      - name: Prepare target directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: mkdir -p ~/apps/spontaneo

      # Copie le docker-compose.yml vers ~/apps/spontaneo/ sur le VPS
      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          source:   "docker-compose.yml"
          target:   "~/apps/spontaneo"

      # Se connecte en SSH et redémarre les services
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key:      ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/apps/spontaneo

            # Authentification GHCR (PAT avec scope read:packages)
            echo "${{ secrets.GHCR_TOKEN }}" | \
              docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Pull des nouvelles images
            docker compose pull

            # Redémarrage sans downtime (les conteneurs existants restent up pendant le pull)
            docker compose up -d --remove-orphans

            # Nettoyage des anciennes images
            docker image prune -f
