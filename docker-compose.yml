services:
  web:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/spontaneo-web:latest
    ports:
      - "4000:3000"
    env_file: ./apps/web/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      WORKER_URL: http://worker:3001
      UPLOADS_ROOT: /srv/uploads
    volumes:
      - uploads:/srv/uploads
    restart: unless-stopped
    depends_on:
      - worker
      - ai-service

  worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/spontaneo-worker:latest
    env_file: ./apps/worker/.env
    environment:
      AI_SERVICE_URL: http://ai-service:8000
      UPLOADS_ROOT: /srv/uploads
    volumes:
      - uploads:/srv/uploads
    restart: unless-stopped
    depends_on:
      - ai-service

  ai-service:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/spontaneo-ai:latest
    env_file: ./apps/ai-service/.env
    restart: unless-stopped

  agent-worker:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/spontaneo-ai:latest
    env_file: ./apps/ai-service/.env
    environment:
      WEB_URL: http://web:3000
      AGENT_WORKER_MAX_CONCURRENT: 2
      AGENT_WORKER_POLL_INTERVAL_MS: 5000
      AGENT_WORKER_STALE_THRESHOLD_SECONDS: 3600
    command: ["python", "-m", "app.agent_worker.main"]
    restart: unless-stopped

  cron:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/spontaneo-cron:latest
    environment:
      CRON_SECRET: ${CRON_SECRET}
      CRON_URL: http://web:3000/api/cron/send-emails
    restart: unless-stopped
    depends_on:
      - web

volumes:
  uploads:
    driver: local
